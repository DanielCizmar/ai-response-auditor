name: evidence-grounded-writing-auditor

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditor}
      POSTGRES_USER: ${POSTGRES_USER:-auditor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditor_local_dev}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/001-enable-vector.sql:/docker-entrypoint-initdb.d/001-enable-vector.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" &&
          psql -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -tAc
          "SELECT 1 FROM pg_extension WHERE extname = 'vector'" | grep -q 1
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.2.14-alpine3.21
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --loglevel
      - warning
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.31.1}
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_NO_CLOUD: "1"
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_MAX_CONCURRENCY:-1}
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_INSTRUCTION_MODEL: ${OLLAMA_INSTRUCTION_MODEL:-qwen3:4b-instruct}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-embeddinggemma}
    ports:
      - "${OLLAMA_BIND_HOST:-127.0.0.1}:${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [CMD, ollama, list]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  redis_data:
