name: Bug report
description: Report a reproducible defect without including private research content.
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Do not include private drafts, uploaded documents, prompts, credentials, or sensitive model output. Use synthetic examples when reproduction text is necessary.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the defect in a few sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible sequence using non-sensitive data.
      placeholder: |
        1. Start ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include sanitized error text if useful.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend or editor
        - FastAPI
        - Ollama or model output
        - Database or migration
        - Worker or Redis
        - Document processing
        - Retrieval or verification
        - Local setup or Docker
        - Vercel portfolio deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Docker/Ollama versions, and CPU/GPU details where relevant.
      placeholder: Windows 11, Chrome 130, Docker ..., Ollama ..., CPU-only
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add sanitized logs, screenshots, or links. Never attach private source material.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed private text, source documents, prompts, credentials, and other sensitive data.
          required: true
        - label: I checked that this issue is not already reported.
          required: true
