name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: "1"

jobs:
  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked Python environment
        run: uv sync --frozen --all-groups
      - name: Check Python formatting
        run: uv run ruff format --check apps backend scripts
      - name: Lint Python
        run: uv run ruff check apps backend scripts
      - name: Type-check Python
        run: uv run mypy apps backend scripts

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked Python environment
        run: uv sync --frozen --all-groups
      - name: Run backend tests
        run: uv run pytest

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install locked JavaScript workspace
        run: corepack pnpm install --frozen-lockfile
      - name: Lint frontend
        run: corepack pnpm lint:web
      - name: Type-check frontend
        run: corepack pnpm typecheck:web

  frontend-test-build:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install locked JavaScript workspace
        run: corepack pnpm install --frozen-lockfile
      - name: Run frontend tests
        run: corepack pnpm test:web
      - name: Build frontend
        run: corepack pnpm build:web

  openapi-contract:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked Python environment
        run: uv sync --frozen --all-groups
      - name: Verify generated OpenAPI contract
        run: uv run python scripts/generate_openapi.py --check

  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg17-bookworm
        env:
          POSTGRES_DB: auditor
          POSTGRES_USER: auditor
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auditor -d auditor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://auditor@localhost:5432/auditor
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Verify migration foundation
        run: |
          uv sync --frozen --all-groups
          uv run python -m alembic upgrade head
          uv run python -m alembic current --check-heads
          uv run python -m alembic check
          uv run pytest backend/tests/test_audit_persistence.py
          uv run python -m alembic downgrade base
          uv run python -m alembic upgrade head

  infrastructure-smoke:
    name: Infrastructure smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Start PostgreSQL and Redis
        run: docker compose up --detach --wait postgres redis
      - name: Run infrastructure smoke test
        run: python scripts/smoke_infra.py
      - name: Stop infrastructure
        if: always()
        run: docker compose down
